<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripHube AI</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .main-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Search Area */
        .btn-plan { width: 100%; padding: 15px; background: #f39c12; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        
        /* Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.8rem; }
        
        /* Status Box */
        .status-box { background: white; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button>Contact Us</button>
        <div>Dark Mode: ON</div>
    </div>

    <div class="main-card" style="text-align:center;">
        <h1>TripHube AI</h1>
        <p>Plan your perfect trip with AI</p>
        <input type="text" placeholder="From" style="width:100%; padding:10px; margin:5px 0;">
        <input type="text" placeholder="To" style="width:100%; padding:10px; margin:5px 0;">
        <button class="btn-plan">Plan My Trip</button>
    </div>

    <div class="status-box">
        <strong>Checking destination details...</strong>
        <p>🛡️ Safety Rating: 88% - Safe</p>
        <p>🏥 Nearest Hospital: 3 mins away</p>
    </div>

    <div class="grid">
        <div class="card">🛡️ Safety & Health</div>
        <div class="card">✈️ Flights</div>
        <div class="card">🏨 Hotels</div>
        <div class="card">🚗 Cars</div>
        <div class="card">🍽️ Restaurants</div>
        <div class="card">👤 Tourist Guides</div>
        <div class="card">📱 SIM Cards</div>
        <div class="card">☀️ Weather</div>
    </div>
    
    <p style="text-align:center; font-size: 0.7rem;">Powered by TripHube</p>
</div>

</body>
</html>
