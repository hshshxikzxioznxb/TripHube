<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripHube AI | رفيق سفرك الذكي</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9151180653196204" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        .bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; opacity: 0.5; object-fit: cover; }
        .container { padding: 20px; background: rgba(0,0,0,0.7); border-radius: 20px; margin: 20px; }
        .search-area { width: 100%; height: 500px; border: none; border-radius: 10px; background: white; margin-top: 20px; }
        .footer-note { font-size: 0.8rem; color: #ccc; margin-top: 20px; }
        .warning { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

    <video autoplay muted loop class="bg-video">
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
    </video>

    <div class="container">
        <h1>TripHube AI 🤖</h1>
        <p>كل خدمات السفر بذكاء اصطناعي واحد. (مجاني تماماً - لا نطلب أي دفع)</p>
        
        <input type="text" id="searchInput" placeholder="اكتب وجهتك أو طلبك هنا..." style="padding:10px; width:80%; border-radius:5px;">
        <button onclick="performSearch()">بحث داخل الموقع</button>

        <iframe id="searchFrame" class="search-area" src="about:blank"></iframe>

        <div class="footer-note">
            <p>تواصل معنا: nnnnj911ksa@Gmail.com</p>
            <p class="warning">⚠️ تنبيه: احذر من المنتحلين، نحن لا نطلب أي مبالغ مالية، جميع خدماتنا مجانية!</p>
            <p>خصوصية عالية وحماية فائقة لمستخدمي TripHube.</p>
        </div>
    </div>

    <script>
        function performSearch() {
            const query = document.getElementById('searchInput').value;
            const frame = document.getElementById('searchFrame');
            // البحث يتم داخل الموقع عبر محرك جوجل المدمج
            frame.src = `https://www.google.com/search?q=${query}+travel+guide+TripHube&igu=1`;
        }
    </script>
</body>
</html>
