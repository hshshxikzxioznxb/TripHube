<!DOCTYPE html>
<html lang="ar" dir="rtl" id="app-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripHube AI - رفيق سفرك الذكي</title>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #2c3e50; --accent: #febb02; }
        .dark-mode { --bg: #1a1a1a; --card: #2d2d2d; --primary: #ecf0f1; }
        body { background: var(--bg); color: var(--primary); font-family: sans-serif; padding: 20px; transition: 0.3s; }
        .container { max-width: 600px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-search { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .status-box { background: #e8f4fd; padding: 15px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between;">
        <button onclick="toggleLang()">🌐 EN/AR</button>
        <button onclick="document.body.classList.toggle('dark-mode')">🌙</button>
    </div>
    
    <h1 style="text-align:center;">TripHube AI</h1>
    
    <input type="text" id="dest" class="card" style="width:100%; border:none; padding:15px; box-sizing:border-box;" placeholder="أدخل وجهتك...">
    <button class="btn-search" onclick="analyze()">خطط لرحلتي</button>

    <div id="status" class="status-box" style="display:none;">
        <p>جاري فحص تفاصيل الوجهة...</p>
        <p>📊 نسبة الأمان: 88% - آمنة</p>
        <p>🏥 أقرب مستشفى: 3 دقائق</p>
    </div>

    <div class="grid">
        <div class="card">🚓 أقرب شرطة</div>
        <div class="card">🍽️ أقرب مطعم</div>
        <div class="card">⛽ أقرب محطة</div>
        <div class="card">🌦️ الطقس</div>
    </div>
</div>

<script>
    function analyze() {
        document.getElementById('status').style.display = 'block';
    }
    function toggleLang() {
        const root = document.getElementById('app-root');
        root.dir = (root.dir === 'rtl') ? 'ltr' : 'rtl';
    }
</script>
</body>
</html>
