<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripHube AI | رفيق سفرك</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9151180653196204" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 1.5rem; text-align: center; }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .results-area { width: 100%; height: 400px; margin-top: 20px; border: 1px solid #eee; border-radius: 8px; }
        .footer { font-size: 0.75rem; color: #7f8c8d; text-align: center; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>TripHube AI 🤖</h1>
    
    <input type="text" id="query" class="input-box" placeholder="وجهتك، فنادق، طيران...">
    <button class="btn" onclick="startSearch()">🔍 بحث سريع</button>

    <iframe id="results" class="results-area" src="about:blank"></iframe>

    <div class="footer">
        <p>nnnnj911ksa@Gmail.com</p>
        <p>خدماتنا مجانية تماماً - لا نطلب أي مبالغ.</p>
    </div>
</div>

<script>
    function startSearch() {
        const q = document.getElementById('query').value;
        const frame = document.getElementById('results');
        if(q) {
            frame.src = `https://www.google.com/search?q=${q}+travel+tips&igu=1`;
        }
    }
</script>
</body>
</html>
